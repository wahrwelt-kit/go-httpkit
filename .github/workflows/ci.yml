name: CI
on:
  push:
    branches: [main, master]
    paths: ['backend/go-httpkit/**']
  pull_request:
    paths: ['backend/go-httpkit/**']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Vet and test
        working-directory: backend/go-httpkit
        run: |
          go mod download
          go vet ./...
          go test -race ./...
